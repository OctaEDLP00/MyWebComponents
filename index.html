<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width" />
    <title>Web Components</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body class="grid min-h-dvh w-screen grid-rows-[auto_1fr_auto]">
    <nav class="flex h-24 items-center justify-around px-8 py-4">
      <h1 class="text-3xl uppercase sm:text-5xl md:text-7xl">custom web components</h1>
      <ul class="flex flex-col items-center justify-center space-x-4 md:flex-row">
        <li>
          <a href="https://github.com/OctaEDLP00/" target="_blank" title="Github">

            </svg>
          </a>
        </li>
        <li>
          <a href="https://x.com/CaroOcta00/" target="_blank" title="Twitter">
            <svg class="size-10" width="19" height="19" fill="currentColor" viewBox="0 0 19 19">
              <path
                fill="#08060d"
                fill-rule="evenodd"
                d="M1.893 1.98c.052.072 1.245 1.769 2.653 3.77l2.892 4.114c.183.261.333.48.333.486s-.068.089-.152.183l-.522.593-.765.867-3.597 4.087c-.375.426-.734.834-.798.905a1 1 0 0 0-.118.148c0 .01.236.017.664.017h.663l.729-.83c.4-.457.796-.906.879-.999a692 692 0 0 0 1.794-2.038c.034-.037.301-.34.594-.675l.551-.624.345-.392a7 7 0 0 1 .34-.374c.006 0 .93 1.306 2.052 2.903l2.084 2.965.045.063h2.275c1.87 0 2.273-.003 2.266-.021-.008-.02-1.098-1.572-3.894-5.547-2.013-2.862-2.28-3.246-2.273-3.266.008-.019.282-.332 2.085-2.38l2-2.274 1.567-1.782c.022-.028-.016-.03-.65-.03h-.674l-.3.342a871 871 0 0 1-1.782 2.025c-.067.075-.405.458-.75.852a100 100 0 0 1-.803.91c-.148.172-.299.344-.99 1.127-.304.343-.32.358-.345.327-.015-.019-.904-1.282-1.976-2.808L6.365 1.85H1.8zm1.782.91 8.078 11.294c.772 1.08 1.413 1.973 1.425 1.984.016.017.241.02 1.05.017l1.03-.004-2.694-3.766L7.796 5.75 5.722 2.852l-1.039-.004-1.039-.004z"
                clip-rule="evenodd"
              />
            </svg>
          </a>
        </li>
      </ul>
    </nav>
    <main class="min-w-7xl px-8 py-4">
      <div class="grid grid-cols-2 grid-rows-1">
        <section class="flex flex-1 flex-col items-center space-y-4">
          <h2 class="px-4 py-2 text-4xl uppercase">alerts markdown</h2>
          <article class="grid w-full grid-cols-3 space-x-2">
            <alert-note></alert-note>
            <alert-important></alert-important>
            <alert-tip></alert-tip>
            <alert-warning></alert-warning>
            <alert-caution></alert-caution>
          </article>
        </section>
        <section class="flex flex-1 flex-col items-center space-y-4">
          <h2 class="px-4 py-2 text-4xl uppercase">badges</h2>
          <article class="flex w-full flex-wrap space-y-2 space-x-2">
            <badge-warning></badge-warning>
            <badge-warning variation="outline"></badge-warning>
            <badge-warning variation="soft"></badge-warning>
            <badge-warning variation="solid"></badge-warning>
            <badge-info></badge-info>
            <badge-info variation="outline"></badge-info>
            <badge-info variation="soft"></badge-info>
            <badge-info variation="solid"></badge-info>
            <badge-error></badge-error>
            <badge-error variation="outline"></badge-error>
            <badge-error variation="soft"></badge-error>
            <badge-error variation="solid"></badge-error>
            <badge-success></badge-success>
            <badge-success variation="outline"></badge-success>
            <badge-success variation="soft"></badge-success>
            <badge-success variation="solid"></badge-success>
            <badge-deprecated></badge-deprecated>
            <badge-deprecated variation="outline"></badge-deprecated>
            <badge-deprecated variation="soft"></badge-deprecated>
            <badge-deprecated variation="solid"></badge-deprecated>
            <badge-experimental></badge-experimental>
            <badge-experimental variation="outline"></badge-experimental>
            <badge-experimental variation="soft"></badge-experimental>
            <badge-experimental variation="solid"></badge-experimental>
            <badge-beta></badge-beta>
            <badge-beta variation="outline"></badge-beta>
            <badge-beta variation="soft"></badge-beta>
            <badge-beta variation="solid"></badge-beta>
            <badge-alpha></badge-alpha>
            <badge-alpha variation="outline"></badge-alpha>
            <badge-alpha variation="soft"></badge-alpha>
            <badge-alpha variation="solid"></badge-alpha>
            <badge-new></badge-new>
            <badge-new variation="outline"></badge-new>
            <badge-new variation="soft"></badge-new>
            <badge-new variation="solid"></badge-new>
            <badge-danger></badge-danger>
            <badge-danger variation="outline"></badge-danger>
            <badge-danger variation="soft"></badge-danger>
            <badge-danger variation="solid"></badge-danger>
            <badge-glass></badge-glass>
            <badge-custom>
              <svg
                slot="icon"
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                slot="icon"
                viewBox="0 0 24 24"
              >
                <path
                  fill="currentColor"
                  d="m8.6 22.5-1.9-3.2-3.6-.8.35-3.7L1 12l2.45-2.8-.35-3.7 3.6-.8 1.9-3.2L12 2.95l3.4-1.45 1.9 3.2 3.6.8-.35 3.7L23 12l-2.45 2.8.35 3.7-3.6.8-1.9 3.2-3.4-1.45zm2.35-6.95L16.6 9.9l-1.4-1.45-4.25 4.25-2.15-2.1L7.4 12z"
                />
              </svg>
              <p slot="text">Verified</p>
            </badge-custom>
          </article>
        </section>
        <section class="flex flex-1 flex-col items-center space-y-4">
          <h2 class="px-4 py-2 text-4xl uppercase">Customs</h2>
          <article class="m-auto flex w-screen flex-1 flex-wrap space-y-2 space-x-2">
            <div class="flex flex-col">
              <h3 class="px-4 py-2 text-xl uppercase">Key Shortcut</h3>
              <key-shortcut keys="ctrl+alt+x x"></key-shortcut>
            </div>
          </article>
          <article class="m-auto flex w-screen flex-1 flex-wrap space-y-2 space-x-2">
            <div class="flex flex-col">
              <h3 class="px-4 py-2 text-xl uppercase">Preview Iframe</h3>
              <preview-iframe
                width="1000"
                height="600"
                allow
                show-zoom-level
                sandbox
                show-controls="true"
                src="https://google.com.ar"
              ></preview-iframe>
            </div>
          </article>
        </section>
      </div>
    </main>
    <footer class="flex h-24 items-center justify-around px-8 py-4"></footer>
  </body>
</html>
